name: ci
on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          # cache: npm
      - run: npm install --ignore-scripts
      - run: npm run lint --if-present
      - run: npm run typecheck --if-present || npx tsc -p tsconfig.json --noEmit

  emulators:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: npm install --ignore-scripts
      # Solo los emuladores que usan los tests de integración (sin functions).
      - run: npx -y firebase-tools@latest emulators:exec --project demo-tutiendaweb --only auth,firestore,storage "npm run test:int"
