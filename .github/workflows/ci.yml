name: ci
on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          # cache: npm
      - run: npm install --ignore-scripts
      - run: npm run lint --if-present
      - run: npm run typecheck --if-present || npx tsc -p tsconfig.json --noEmit
      # Gate de cobertura (Fase 5): corre unit + valida thresholds. Bloqueante.
      - run: npm run test:cov

  emulators:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: npm install --ignore-scripts
      # Solo los emuladores que usan los tests de integración + reglas (sin functions).
      # Un único emulators:exec corre integración (Fase 2) y reglas (Fase 3).
      - run: npx -y firebase-tools@latest emulators:exec --project demo-tutiendaweb --only auth,firestore,storage "npm run test:int && npm run test:rules"

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: npm install --ignore-scripts
      # Variables públicas + hosts de emulador para que `next dev` (que levanta
      # Playwright) y el Admin SDK apunten a los emuladores. Ver .env.emulator.
      - run: cp .env.emulator .env.local
      - run: npx playwright install --with-deps chromium
      # Emuladores arriba → seed de datos → suite E2E (Fase 4).
      # Playwright arranca `next dev` vía su webServer.
      - run: npx -y firebase-tools@latest emulators:exec --project demo-tutiendaweb --only auth,firestore,storage "npm run seed:emulator && npm run test:e2e"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
